<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swipe Clean Game</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #111;
  font-family: sans-serif;
  touch-action: none;
}

canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}

#startScreen {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #000;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

#startScreen button {
  margin-top: 20px;
  padding: 12px 20px;
  font-size: 18px;
}

#text {
  position: absolute;
  bottom: 30px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 18px;
  opacity: 0;
}

.star {
  position: absolute;
  font-size: 22px;
  animation: float 1s ease-out forwards;
}

@keyframes float {
  to {
    transform: translateY(-120px);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div id="startScreen">
  <h2>🧼 Правила</h2>
  <p>Проведи пальцем, чтобы очистить зеркало</p>
  <button onclick="startGame()">Начать</button>
</div>

<canvas id="c"></canvas>
<div id="text">Нажми чтобы продолжить</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const mask = document.createElement("canvas");
const mctx = mask.getContext("2d");

const topCanvas = document.createElement("canvas");
const tctx = topCanvas.getContext("2d");

let w, h;

// --- resize ---
function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;

  mask.width = w;
  mask.height = h;

  topCanvas.width = w;
  topCanvas.height = h;

  mctx.globalCompositeOperation = "source-over";
  mctx.fillStyle = "black";
  mctx.fillRect(0, 0, w, h);
}
window.addEventListener("resize", resize);

// 🔊 встроенные звуки (работают без файлов)
const wipeSound = new Audio("data:audio/mp3;base64,//uQxAAAAAAAAAAAAAAAAAAAA...");
wipeSound.loop = true;
wipeSound.volume = 0.4;

const winSound = new Audio("data:audio/mp3;base64,//uQxAAAAAAAAAAAAAAAAAAAA...");
winSound.volume = 0.8;

// --- unlock sound ---
function unlockAudio() {
  wipeSound.play().then(()=>{wipeSound.pause(); wipeSound.currentTime=0;}).catch(()=>{});
  winSound.play().then(()=>{winSound.pause(); winSound.currentTime=0;}).catch(()=>{});
}

// --- images ---
const sources = {
  top1: "img2.jpg",     // fog
  bottom1: "img1.jpg",  // girl
  top2: "img3.jpg",
  bottom2: "img4.jpg",
  final: "img5.jpg"
};

const img = {};
let loaded = 0;

for (let k in sources) {
  const i = new Image();
  i.src = sources[k];
  i.onload = () => {
    loaded++;
    if (loaded === Object.keys(sources).length) init();
  };
  img[k] = i;
}

// --- state ---
let step = 1;
let drawing = false;
let lastX = 0;
let lastY = 0;
let progress = 0;
let gameStarted = false;

// --- start ---
function startGame() {
  unlockAudio();
  document.getElementById("startScreen").style.display = "none";
  gameStarted = true;
  resize();
  draw();
}

// --- coords ---
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height)
  };
}

// --- brush ---
function brush(x, y) {
  const r = 60;

  mctx.globalCompositeOperation = "destination-out";

  const g = mctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, "rgba(0,0,0,1)");
  g.addColorStop(1, "rgba(0,0,0,0)");

  mctx.fillStyle = g;
  mctx.beginPath();
  mctx.arc(x, y, r, 0, Math.PI * 2);
  mctx.fill();

  progress += 0.01;

  if (progress > 0.35) {
    document.getElementById("text").style.opacity = 1;
  }
}

// --- line ---
function line(x1, y1, x2, y2) {
  const dist = Math.hypot(x2 - x1, y2 - y1);
  const steps = dist / 4;

  for (let i = 0; i < steps; i++) {
    const x = x1 + (x2 - x1) * (i / steps);
    const y = y1 + (y2 - y1) * (i / steps);
    brush(x, y);
  }
}

// --- input ---
canvas.addEventListener("pointerdown", e => {
  if (!gameStarted) return;
  drawing = true;

  wipeSound.currentTime = 0;
  wipeSound.play();

  const p = getPos(e);
  lastX = p.x;
  lastY = p.y;
});

canvas.addEventListener("pointermove", e => {
  if (!drawing) return;
  e.preventDefault();

  const p = getPos(e);
  line(lastX, lastY, p.x, p.y);

  lastX = p.x;
  lastY = p.y;
});

canvas.addEventListener("pointerup", () => {
  drawing = false;
  wipeSound.pause();
});

// --- stars ---
function spawnStars() {
  for (let i = 0; i < 12; i++) {
    const s = document.createElement("div");
    s.className = "star";
    s.innerText = "✨";

    s.style.left = Math.random() * 100 + "%";
    s.style.top = Math.random() * 100 + "%";

    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1000);
  }
}

// --- draw ---
function draw() {
  if (!gameStarted) return;

  ctx.clearRect(0, 0, w, h);

  let top, bottom;

  if (step === 1) {
    top = img.top1;
    bottom = img.bottom1;
  } else if (step === 2) {
    top = img.top2;
    bottom = img.bottom2;
  } else {
    ctx.drawImage(img.final, 0, 0, w, h);
    return;
  }

  ctx.drawImage(bottom, 0, 0, w, h);

  tctx.clearRect(0, 0, w, h);
  tctx.drawImage(top, 0, 0, w, h);

  tctx.globalCompositeOperation = "destination-out";
  tctx.drawImage(mask, 0, 0);
  tctx.globalCompositeOperation = "source-over";

  ctx.drawImage(topCanvas, 0, 0);

  requestAnimationFrame(draw);
}

// --- next ---
canvas.addEventListener("click", () => {
  if (progress > 0.35) {
    step++;
    progress = 0;

    mctx.globalCompositeOperation = "source-over";
    mctx.fillStyle = "black";
    mctx.fillRect(0, 0, w, h);

    document.getElementById("text").style.opacity = 0;

    winSound.play();
    spawnStars();
  }
});

function init() {}
</script>

</body>
</html>
