<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Swipe Clean Game</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#111;
}

#wrap{
  position:relative;
  width:100%;
  height:100%;
}

canvas{
  position:absolute;
  top:0;
  left:0;
}
</style>
</head>

<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <canvas id="mask"></canvas>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const maskCanvas = document.getElementById("mask");
const maskCtx = maskCanvas.getContext("2d");

let w,h;
function resize(){
  w = canvas.width = maskCanvas.width = innerWidth;
  h = canvas.height = maskCanvas.height = innerHeight;
}
window.addEventListener("resize", resize);
resize();

// 🎮 SCENES
const steps = [
  { top:"img1.jpg", bottom:"img2.jpg" },
  { top:"img4.jpg", bottom:"img5.jpg" }
];

let step = 0;

// images
let topImg = new Image();
let bottomImg = new Image();

// mask = "holes"
function resetMask(){
  maskCtx.clearRect(0,0,w,h);
  maskCtx.fillStyle = "black";
  maskCtx.fillRect(0,0,w,h);
}

function load(){
  topImg = new Image();
  bottomImg = new Image();

  topImg.src = steps[step].top;
  bottomImg.src = steps[step].bottom;

  resetMask();
}

load();

// 🧽 brush
const brush = 70;
let drawing = false;
let last = null;

function drawScratch(x,y){
  maskCtx.globalCompositeOperation = "destination-out";

  const g = maskCtx.createRadialGradient(x,y,0,x,y,brush);
  g.addColorStop(0,"rgba(0,0,0,1)");
  g.addColorStop(1,"rgba(0,0,0,0)");

  maskCtx.fillStyle = g;
  maskCtx.beginPath();
  maskCtx.arc(x,y,brush,0,Math.PI*2);
  maskCtx.fill();

  maskCtx.globalCompositeOperation = "source-over";
}

// 🎨 render loop (IMPORTANT FIX HERE)
function render(){
  ctx.clearRect(0,0,w,h);

  // 1. draw bottom FIRST
  if(bottomImg.complete){
    ctx.drawImage(bottomImg,0,0,w,h);
  }

  // 2. draw top
  if(topImg.complete){
    ctx.drawImage(topImg,0,0,w,h);
  }

  // 3. erase TOP using mask (CRITICAL FIX)
  ctx.globalCompositeOperation = "destination-out";
  ctx.drawImage(maskCanvas,0,0);
  ctx.globalCompositeOperation = "source-over";

  requestAnimationFrame(render);
}
render();

// 🎮 input
function getPos(e){
  const t = e.touches ? e.touches[0] : e;
  return {x:t.clientX,y:t.clientY};
}

window.addEventListener("pointerdown",(e)=>{
  drawing = true;
  last = getPos(e);
});

window.addEventListener("pointermove",(e)=>{
  if(!drawing) return;
  const p = getPos(e);
  drawScratch(p.x,p.y);
});

window.addEventListener("pointerup",()=>drawing=false);

</script>
</body>
</html>
