<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Swipe Clean FIXED</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#111;
}

canvas{
  position:absolute;
  top:0;
  left:0;
}
</style>
</head>

<body>

<canvas id="view"></canvas>
<canvas id="mask"></canvas>

<script>
const view = document.getElementById("view");
const vctx = view.getContext("2d");

const mask = document.getElementById("mask");
const mctx = mask.getContext("2d");

let w,h;

function resize(){
  w = view.width = mask.width = innerWidth;
  h = view.height = mask.height = innerHeight;
}
window.addEventListener("resize", resize);
resize();


// 🎮 SCENES (FIXED as you requested)
const steps = [
  { top:"img1.jpg", bottom:"img2.jpg" },
  { top:"img4.jpg", bottom:"img5.jpg" }
];

let step = 0;

// images
let topImg = new Image();
let bottomImg = new Image();

function loadStep(){
  topImg = new Image();
  bottomImg = new Image();

  topImg.src = steps[step].top;
  bottomImg.src = steps[step].bottom;

  resetMask();
}

function resetMask(){
  mctx.clearRect(0,0,w,h);
  mctx.fillStyle = "black";
  mctx.fillRect(0,0,w,h);
}

loadStep();


// 🧽 brush
const brush = 80;
let drawing = false;

// convert coords properly
function pos(e){
  const t = e.touches ? e.touches[0] : e;
  return {x:t.clientX,y:t.clientY};
}

function scratch(x,y){
  mctx.globalCompositeOperation = "destination-out";

  const g = mctx.createRadialGradient(x,y,0,x,y,brush);
  g.addColorStop(0,"rgba(0,0,0,1)");
  g.addColorStop(1,"rgba(0,0,0,0)");

  mctx.fillStyle = g;
  mctx.beginPath();
  mctx.arc(x,y,brush,0,Math.PI*2);
  mctx.fill();

  mctx.globalCompositeOperation = "source-over";
}


// 🎨 RENDER (THIS IS THE FIX)
function render(){
  vctx.clearRect(0,0,w,h);

  // 1. draw bottom FIRST
  if(bottomImg.complete){
    vctx.drawImage(bottomImg,0,0,w,h);
  }

  // 2. draw top ON TOP
  if(topImg.complete){
    vctx.drawImage(topImg,0,0,w,h);
  }

  // 3. erase TOP using mask
  vctx.globalCompositeOperation = "destination-out";
  vctx.drawImage(mask,0,0);
  vctx.globalCompositeOperation = "source-over";

  requestAnimationFrame(render);
}
render();


// 🎮 INPUT
window.addEventListener("pointerdown",(e)=>{
  drawing = true;
  const p = pos(e);
  scratch(p.x,p.y);
});

window.addEventListener("pointermove",(e)=>{
  if(!drawing) return;
  const p = pos(e);
  scratch(p.x,p.y);
});

window.addEventListener("pointerup",()=>drawing=false);

</script>

</body>
</html>
